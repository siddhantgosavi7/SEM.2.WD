<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name =" viewport" content="width device-width,initial-scale=1.0">
    <style>
        body {
        font-family: Arial, sans-serif;
        align-items: center;
        height: 100vh;
        margin: 0;

        h1 {
        text-align: center;
        color: #2c3e50;
        }

        label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        }

        .form {
            align-items: center;
            background: white;
        padding: 30px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

    }
    </style>

<title>Generate a Form</title>
</head>
<body style="background-color: powderblue;">

<div class="form">
    <h1 style="text-align: center; color: darkblue;">Student Details</h1>
    <u>Student Details<u></u></h1><br>
    <form>
       <label>First Name:</label>
       <input type="text" placeholder="Enter First Name" required> <br>

       <label>Last Name:</label>
       <input type="text" placeholder="Enter Last Name" required><br>

       <label>E-mail</label>
       <input type="email" placeholder="Enter Email" required><br>

       <label>PRN Number</label>
       <input type="text" placeholder="Enter PRN Number" required><br>

       <label>Enter Phone Number</label>
       <input type="tel" placeholder="Enter Phone Number" requireds><br>

       <label>Enter Gender</label>
       <input type="radio" name="Gender">Male
       <input type="radio" name="Gender">Female
       <br>
       <label><h2>Skills</h2></label>
       <input type="checkbox" name="skills" value="C"> C <br>
       <input type="checkbox" name="skills" value="C++"> C++ <br>
       <input type="checkbox" name="skills" value="Python"> Python <br>
       <input type="checkbox" name="skills" value="WD"> Web Devlopment <br>
    </form>
</div>
</body>
</html>
