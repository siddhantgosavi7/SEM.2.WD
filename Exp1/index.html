<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Sidebar</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        /* Sidebar */
        .sidebar{
            position:fixed;
            top:0;
            left:-250px;
            width:250px;
            height:100vh;
            background:#222;
            padding-top:60px;
            transition:0.4s;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            padding:18px 25px;
            border-bottom:1px solid #444;
        }

        .sidebar ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .sidebar ul li:hover{
            background:#444;
        }

        /* Menu Button */
        .menu-btn{
            position:absolute;
            top:20px;
            left:20px;
            background:#222;
            color:white;
            border:none;
            padding:12px 18px;
            cursor:pointer;
            font-size:18px;
            border-radius:5px;
        }

        .content{
            padding:80px 30px;
        }

        h1{
            margin-bottom:15px;
        }
    </style>
</head>
<body>

    <button class="menu-btn">☰ Menu</button>

    <!-- Sidebar -->
    <div class="sidebar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Sliding Sidebar</h1>
        <p>
            A quiet panel hidden in the shadows,  
            waiting for a click to glide into view.
        </p>
    </div>

    <script>
        $(document).ready(function(){

            let isOpen = false;

            $(".menu-btn").click(function(){

                if(!isOpen){
                    $(".sidebar").css("left","0");
                    isOpen = true;
                }
                else{
                    $(".sidebar").css("left","-250px");
                    isOpen = false;
                }

            });

        });
    </script>

</body>
</html>
